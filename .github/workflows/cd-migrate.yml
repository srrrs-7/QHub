# CD Migration: Database Migration via ECS Job
#
# Trigger:
#   - Manual (workflow_dispatch): Select environment
#   - Callable from other workflows (workflow_call)
#
# Flow:
#   1. Build and push migration image to ECR
#   2. Run ECS migration task
#   3. Wait for completion and verify success
#
# Authentication:
#   - AWS OIDC (no long-lived credentials)
#   - RDS IAM Authentication (no stored DB passwords)
#
# Required GitHub Environments: dev, stg, prd
#
# Environment Variables (set per environment):
#   - AWS_REGION: AWS region (e.g., ap-northeast-1)
#   - AWS_ROLE_ARN: IAM Role ARN for OIDC authentication
#   - ECR_REPOSITORY_MIGRATE: ECR repository for migration
#   - ECS_CLUSTER: ECS cluster name
#   - ECS_TASK_DEFINITION_MIGRATE: ECS task definition for migration
#   - ECS_SUBNET_IDS: Comma-separated subnet IDs for ECS tasks
#   - ECS_SECURITY_GROUP_ID: Security group ID for ECS tasks

name: CD Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd

  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string

# Prevent concurrent migrations to same environment
concurrency:
  group: cd-migrate-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/migrate/.images/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_MIGRATE }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_MIGRATE }}:latest
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate
          provenance: false

      - name: Run ECS migration task
        id: run-task
        run: |
          # Parse subnet IDs (comma-separated to JSON array)
          SUBNET_IDS=$(echo "${{ vars.ECS_SUBNET_IDS }}" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$";""))')

          # Run ECS task
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --task-definition ${{ vars.ECS_TASK_DEFINITION_MIGRATE }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=${SUBNET_IDS},securityGroups=[\"${{ vars.ECS_SECURITY_GROUP_ID }}\"],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"migrate\",\"environment\":[{\"name\":\"MIGRATION_SHA\",\"value\":\"${{ github.sha }}\"}]}]}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "::notice::Started ECS migration task: $TASK_ARN"

      - name: Wait for migration to complete
        id: wait-task
        run: |
          TASK_ARN="${{ steps.run-task.outputs.task_arn }}"
          CLUSTER="${{ vars.ECS_CLUSTER }}"

          echo "Waiting for migration task to complete..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          # Get task exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          STOP_REASON=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "stop_reason=$STOP_REASON" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed with exit code: $EXIT_CODE"
            echo "::error::Stop reason: $STOP_REASON"
            exit 1
          fi

          echo "::notice::Migration completed successfully"

      - name: Show migration logs
        if: always()
        run: |
          TASK_ARN="${{ steps.run-task.outputs.task_arn }}"
          TASK_ID=$(echo "$TASK_ARN" | rev | cut -d'/' -f1 | rev)

          echo "=== Migration Logs ==="
          aws logs get-log-events \
            --log-group-name "/ecs/${{ vars.ECS_CLUSTER }}/migrate" \
            --log-stream-name "ecs/migrate/$TASK_ID" \
            --query 'events[*].message' \
            --output text 2>/dev/null || echo "No logs available yet"
